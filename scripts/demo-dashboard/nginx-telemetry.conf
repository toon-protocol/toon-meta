# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Public demo dashboard — nginx snippet for each devnet connector box.
#
# Paste the "read-only telemetry" block into the `server { listen 443 ssl; }`
# block of every box's node.conf (after the `resolver` line). Add the "dash
# page" block on the TOON apex box ONLY (it serves the aggregated page). Then:
#   docker exec <box>-nginx-1 nginx -t && docker exec <box>-nginx-1 nginx -s reload
# (zero-downtime reload — no container restart).
#
# What it exposes: ONLY the read-only connector admin telemetry
# (/admin/metrics.json, /admin/earnings.json, /admin/routes, /admin/peers,
# /admin/channels), GET-only, CORS-locked to the dashboard origin. Mutating
# admin routes (POST /admin/peers, PUT /admin/desired-state, …) are NOT proxied.
# This is temporary demo exposure — remove after demo day (restore node.conf).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── read-only connector telemetry (ALL boxes) ──
location ~ ^/admin/(metrics\.json|earnings\.json|routes|peers|channels)$ {
    limit_except GET { deny all; }
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin "https://faucet.devnet.toonprotocol.dev" always;
    add_header Cache-Control "no-store" always;
    set $conn_admin http://connector:8081;
    proxy_pass $conn_admin$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# ── aggregated dashboard page (TOON apex box ONLY) ──
# Build the app (npm run build in scripts/demo-dashboard) and extract dist/* into
# conf.d/dashsite/ (index.html + assets/). The conf.d dir is bind-mounted into
# the nginx container, so the SPA + its /dash/assets/* bundle are served directly.
location = /dash  { return 302 https://$host/dash/; }
location /dash/ {
    alias /etc/nginx/conf.d/dashsite/;
    index index.html;
    try_files $uri $uri/ /dash/index.html;
}
