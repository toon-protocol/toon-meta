# Loop A — Backlog Manager (triage / label / PR-sync).
# Copy to <repo>/.github/workflows/backlog-manager.yml. Defaults to dry-run.
# Stagger the cron minute/hour per repo so 8 repos don't all spike Max usage at once.
name: Backlog Manager

on:
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC — change per repo to stagger
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run reports only; apply mutates the tracker"
        type: choice
        options: [dry-run, apply]
        default: dry-run

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: backlog-manager-${{ github.repository }}
  cancel-in-progress: false

jobs:
  backlog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Custom org App token — REQUIRED to write org-level GitHub Projects.
      # The default GITHUB_TOKEN and the official Claude app cannot write org Projects.
      # If you skip this, drop `github_token` below; the board becomes report-only.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          plugin_marketplaces: "https://github.com/toon-protocol/toon-meta.git"
          plugins: "toon-skills@toon-meta"
          prompt: >-
            /toon-skills:backlog-manager ${{ github.event.inputs.mode || 'dry-run' }}
            GitHub backlog for ${{ github.repository }} including its GitHub Project.
            This is an unattended scheduled run: never prompt; record blockers in the
            final report and exit. Source of truth is this repo's GitHub Issues.
          claude_args: "--max-turns 30"
