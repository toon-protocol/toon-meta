# Loop B — Issue Executor (implements agent:ready tickets; bounded fix loop).
# Copy to <repo>/.github/workflows/issue-executor.yml.
# Two triggers: a new agent:ready label starts execution; a changes_requested
# review drives the bounded fix loop on the same PR.
name: Issue Executor

on:
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Fresh execution: the backlog-manager just marked an issue agent:ready.
  execute:
    if: github.event_name == 'issues' && github.event.label.name == 'agent:ready'
    runs-on: ubuntu-latest
    concurrency:
      group: executor-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          plugin_marketplaces: "https://github.com/toon-protocol/toon-meta.git"
          plugins: "toon-skills@toon-meta"
          prompt: >-
            /toon-skills:issue-executor implement issue
            #${{ github.event.issue.number }} in ${{ github.repository }} and open a PR.
            Branch must be named agent/<issue>-<slug> so the reviewer loop runs.
          claude_args: "--max-turns 40"

  # Bounded fix loop: the reviewer requested changes on an agent/ PR.
  fixup:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      startsWith(github.event.pull_request.head.ref, 'agent/')
    runs-on: ubuntu-latest
    concurrency:
      group: executor-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          plugin_marketplaces: "https://github.com/toon-protocol/toon-meta.git"
          plugins: "toon-skills@toon-meta"
          prompt: >-
            /toon-skills:issue-executor address the requested changes on pull
            #${{ github.event.pull_request.number }} in ${{ github.repository }}.
            Follow the bounded fix loop: respect the review-round:<n> cap and
            escalate to needs:human if the cap is exceeded.
          claude_args: "--max-turns 40"
