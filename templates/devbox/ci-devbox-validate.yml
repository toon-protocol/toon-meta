# Drop-in `devbox-validate` job. Paste this job into the repo's existing CI
# workflow (e.g. .github/workflows/ci.yml). Keep it NON-GATING — do NOT add it
# to any `ci-status` `needs:` list. It's a reproducibility bake-in signal, not a
# merge gate, so a Nix/devbox hiccup never blocks a PR.
#
# This is the BASE version (Node + pnpm). If the repo pins chain tooling, enable
# the matching opt-in lines in "Assert tool versions" and add the Solana cache
# step (see the commented blocks below + templates/devbox/README.md).

  devbox-validate:
    name: Devbox Environment Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      # --- OPT-IN (Solana repos only): cache the CLI the init_hook installs ---
      # - name: Cache Solana CLI
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.local/share/solana
      #     key: solana-cli-${{ runner.os }}-v3.1.12

      - name: Assert tool versions
        run: |
          # Write the assertion script to a file and run it via `devbox run -- bash
          # <file>`. Passing a multi-line script as a single `bash -c "..."` argument
          # through `devbox run --` re-tokenizes embedded newlines, so feed a real
          # script. The single-quoted heredoc keeps regex backslashes literal.
          # Assert ONLY the tools this repo actually pins in devbox.json.
          cat > "${RUNNER_TEMP:-/tmp}/assert-versions.sh" <<'ASSERT'
          set -euo pipefail
          node --version | grep -E '^v22\.'
          pnpm --version | grep -E '^8\.15\.'
          # --- OPT-IN (uncomment the lines for tooling this repo pins) ---
          # cargo --version
          # rustc --version
          # forge --version   # assert it runs; the nixpkgs version != `forge --version` output
          # cast --version
          # anvil --version
          # jq --version | grep -E '^jq-1\.7\.'
          # solana --version | grep -E '^solana-cli 3\.1\.12'
          ASSERT
          devbox run -- bash "${RUNNER_TEMP:-/tmp}/assert-versions.sh"
          echo "✅ All devbox tools resolved at expected versions"

      - name: Smoke build
        run: devbox run -- bash -c "pnpm install --frozen-lockfile && pnpm build"
