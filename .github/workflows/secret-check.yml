name: Secret Check
on: { workflow_dispatch: {} }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Report which secrets are set (booleans only)
        run: |
          echo "CLAUDE_CODE_OAUTH_TOKEN set: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}"
          echo "APP_ID set:                 ${{ secrets.APP_ID != '' }}"
          echo "APP_PRIVATE_KEY set:        ${{ secrets.APP_PRIVATE_KEY != '' }}"
